<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plateforme École</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f2f5fa;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#2b3a55;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#3b6ef5;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2e58c9;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="login-container">

<h1>Plateforme École</h1>

<select id="role">
<option value="eleve">Élève</option>
<option value="prof">Professeur</option>
<option value="sahraoui">Responsable pédagogique</option>
</select>

<input type="text" id="identifiant" placeholder="Identifiant">

<input type="password" id="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>

<div class="footer">
Projet école familial
</div>

</div>

<script>

function login(){

let role = document.getElementById("role").value;

if(role === "eleve"){
window.location.href = "eleve.html";
}

if(role === "prof"){
window.location.href = "professeur.html";
}

if(role === "sahraoui"){
window.location.href = "sahraoui.html";
}

}

</script>

</body>
</html>
