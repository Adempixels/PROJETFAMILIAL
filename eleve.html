<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Espace Élève</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.dot{
height:14px;
width:14px;
border-radius:50%;
display:inline-block;
}

.red{background:red}
.orange{background:orange}
.green{background:green}
.blue{background:blue}

</style>

</head>

<body>

<h1>Mes notes</h1>

<table>

<thead id="thead"></thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { db } from "./firebase.js"

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const eleve="Assia Gueblaoui"

let evaluations=[]
let notes=[]

const thead=document.getElementById("thead")
const tbody=document.getElementById("tbody")

async function chargerEvaluations(){

const snap=await getDocs(collection(db,"evaluations"))

evaluations=[]

snap.forEach(d=>{
evaluations.push({id:d.id,...d.data()})
})

}

async function chargerNotes(){

const snap=await getDocs(collection(db,"notes"))

notes=[]

snap.forEach(d=>{
notes.push(d.data())
})

}

function competenceAuto(note){

if(note<8) return "red"

if(note<12) return "orange"

if(note<16) return "green"

return "blue"

}

function afficher(){

thead.innerHTML="<tr><th>Evaluation</th><th>Note</th><th>Compétence</th></tr>"

tbody.innerHTML=""

evaluations.forEach(e=>{

const noteEleve=notes.find(n=>n.eleve===eleve && n.evaluation===e.titre)

if(noteEleve){

const couleur=competenceAuto(noteEleve.note)

tbody.innerHTML+=`
<tr>
<td>${e.titre}</td>
<td>${noteEleve.note}</td>
<td><span class="dot ${couleur}"></span></td>
</tr>
`

}

})

}

async function init(){

await chargerEvaluations()

await chargerNotes()

afficher()

}

init()

</script>

</body>
</html>
