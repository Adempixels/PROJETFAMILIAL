<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Espace Professeur</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

button{
padding:10px 15px;
background:#2d6cdf;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
margin-top:20px;
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

input{
width:60px;
}

.dot{
height:14px;
width:14px;
border-radius:50%;
display:inline-block;
cursor:pointer;
margin:2px;
}

.red{background:red}
.orange{background:orange}
.green{background:green}
.blue{background:blue}

.selected{
border:3px solid black;
}

</style>

</head>

<body>

<h1>Espace Professeur</h1>

<button onclick="creerEvaluation()">Créer une évaluation</button>

<table>

<thead id="thead">
<tr>
<th>Élève</th>
<th>Moyenne</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<br>

<button onclick="sauvegarderNotes()">Sauvegarder les notes</button>

<script type="module">

import { db } from "./firebase.js"

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const eleves=[
"Assia Gueblaoui",
"Ahmed Gueblaoui",
"Mohamed Amine Gueblaoui",
"Abdelrahman Gueblaoui",
"Isaac Sahli"
]

let evaluations=[]

const tbody=document.getElementById("tbody")
const thead=document.getElementById("thead")

async function chargerEvaluations(){

const snap=await getDocs(collection(db,"evaluations"))

evaluations=[]

snap.forEach(d=>{
evaluations.push({id:d.id,...d.data()})
})

afficherTableau()

}

window.creerEvaluation=async function(){

const titre=prompt("Nom de l'évaluation")

if(!titre)return

await addDoc(collection(db,"evaluations"),{

titre:titre,
coefficient:1,
date:new Date().toISOString()

})

chargerEvaluations()

}

window.supprimerEvaluation=async function(id){

await deleteDoc(doc(db,"evaluations",id))

chargerEvaluations()

}

function afficherTableau(){

thead.innerHTML="<tr><th>Élève</th>"

evaluations.forEach(e=>{

thead.innerHTML+=`
<th>
${e.titre}
<br>
<button onclick="supprimerEvaluation('${e.id}')">❌</button>
</th>
`

})

thead.innerHTML+="<th>Moyenne</th></tr>"

tbody.innerHTML=""

eleves.forEach(nom=>{

let row=`<tr><td>${nom}</td>`

evaluations.forEach((e,i)=>{

row+=`
<td>

<input type="number" id="${nom}-${i}" min="0" max="20">

<br>

<div>

<span class="dot red" onclick="selectDot(this)"></span>
<span class="dot orange" onclick="selectDot(this)"></span>
<span class="dot green" onclick="selectDot(this)"></span>
<span class="dot blue" onclick="selectDot(this)"></span>

</div>

</td>
`

})

row+=`<td id="moy-${nom}">-</td></tr>`

tbody.innerHTML+=row

})

}

window.selectDot=function(el){

const parent=el.parentNode

parent.querySelectorAll(".dot").forEach(d=>{
d.classList.remove("selected")
})

el.classList.add("selected")

}

window.calculerMoyennes=function(){

eleves.forEach(nom=>{

let total=0
let count=0

evaluations.forEach((e,i)=>{

const val=document.getElementById(`${nom}-${i}`)

if(val && val.value){

total+=parseFloat(val.value)
count++

}

})

const moy=count? (total/count).toFixed(2):"-"

document.getElementById(`moy-${nom}`).innerText=moy

})

}

window.sauvegarderNotes=async function(){

for(let eleve of eleves){

evaluations.forEach(async (e,i)=>{

const noteInput=document.getElementById(`${eleve}-${i}`)

if(noteInput && noteInput.value){

await addDoc(collection(db,"notes"),{

eleve:eleve,
evaluation:e.titre,
note:parseFloat(noteInput.value)

})

}

})

}

alert("Notes sauvegardées")

}

setInterval(calculerMoyennes,2000)

chargerEvaluations()

</script>

</body>
</html>
