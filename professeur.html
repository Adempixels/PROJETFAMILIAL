<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Espace Professeur</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
color:#333;
}

button{
padding:10px 18px;
border:none;
background:#2d6cdf;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e4fb0;
}

table{
margin-top:20px;
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

input{
width:60px;
}

select{
padding:4px;
}

.evaluationBar{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Espace Professeur</h1>

<div class="evaluationBar">
<button onclick="creerEvaluation()">Créer une évaluation</button>
</div>

<table id="tableNotes">

<thead id="thead">
<tr>
<th>Élève</th>
<th>Moyenne</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { db } from "./firebase.js"

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const eleves=[
"Assia Gueblaoui",
"Ahmed Gueblaoui",
"Mohamed Amine Gueblaoui",
"Abdelrahman Gueblaoui",
"Isaac Sahli"
]

let evaluations=[]

const tbody=document.getElementById("tbody")
const thead=document.getElementById("thead")

// charger les evaluations

async function chargerEvaluations(){

const snap=await getDocs(collection(db,"evaluations"))

evaluations=[]

snap.forEach(d=>{
evaluations.push({id:d.id,...d.data()})
})

afficherTableau()

}

window.creerEvaluation=async function(){

const titre=prompt("Nom de l'évaluation")

if(!titre)return

await addDoc(collection(db,"evaluations"),{

titre:titre,
coefficient:1,
date:new Date().toISOString()

})

chargerEvaluations()

}

// supprimer evaluation

async function supprimerEvaluation(id){

await deleteDoc(doc(db,"evaluations",id))

chargerEvaluations()

}

// afficher tableau

function afficherTableau(){

thead.innerHTML="<tr><th>Élève</th>"

evaluations.forEach(e=>{

thead.innerHTML+=`
<th>
${e.titre}
<br>
<button onclick="supprimerEvaluation('${e.id}')">❌</button>
</th>
`

})

thead.innerHTML+="<th>Moyenne</th></tr>"

tbody.innerHTML=""

eleves.forEach(nom=>{

let row=`<tr><td>${nom}</td>`

evaluations.forEach((e,i)=>{

row+=`
<td>

<input type="number" id="${nom}-${i}" min="0" max="20">

<br>

<select id="comp-${nom}-${i}">
<option></option>
<option>Insuffisant</option>
<option>Fragile</option>
<option>Satisfaisant</option>
<option>Très bon</option>
</select>

</td>
`

})

row+=`<td id="moy-${nom}">-</td></tr>`

tbody.innerHTML+=row

})

}

// calcul moyenne

window.calculerMoyennes=function(){

eleves.forEach(nom=>{

let total=0
let count=0

evaluations.forEach((e,i)=>{

const val=document.getElementById(`${nom}-${i}`)

if(val && val.value){

total+=parseFloat(val.value)
count++

}

})

const moy=count? (total/count).toFixed(2):"-"

document.getElementById(`moy-${nom}`).innerText=moy

})

}

setInterval(calculerMoyennes,2000)

chargerEvaluations()

</script>

</body>
</html>
